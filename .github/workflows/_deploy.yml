name: deploy-template

on:
  workflow_call:
    inputs:
      ocir_repository:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
        description: "Dockerfile path (e.g., Dockerfile)"
    secrets:
      OCI_AUTH_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm

    env:
      IMAGE_TAG: ${{ github.run_number }}
      OCIR_REGISTRY: yny.ocir.io
      OCIR_NAMESPACE: ax1dvc8vmenm
      OCIR_REPOSITORY: ${{ inputs.ocir_repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # SchemaSpy 이미지는 amd64 전용이라 arm64 러너에서 실행하려면 QEMU 에뮬레이션이 필요.
      # 아래 두 단계는 continue-on-error: 문서 생성은 배포의 필수 요소가 아니므로
      # 실패해도 배포를 막지 않는다(최악의 경우 그 회차 /schema 문서만 누락).
      - name: Set up QEMU
        continue-on-error: true
        uses: docker/setup-qemu-action@v3

      # DB 스키마 문서 생성 → src/main/resources/static/schema 에 배치.
      # 다음 bootJar 단계에서 정적 리소스로 패키징되어 백엔드 도메인 /schema 에서 서빙됨.
      - name: Generate DB schema docs (SchemaSpy)
        continue-on-error: true
        run: ./schemaspy/run.sh gen

      - name: Build Jar
        run: ./gradlew bootJar

      - name: Login to OCIR
        run: echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login $OCIR_REGISTRY -u ax1dvc8vmenm/members/waffle-deployer --password-stdin

      - name: Docker build, tag, and push image to OCIR
        id: build-push-image
        run: |
          docker build \
            -f ${{ inputs.dockerfile }} \
            -t $OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG \
            . \
            --platform linux/arm64
          docker push $OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG
          echo "image=$OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
