# SchemaSpy 설정 — SnuClear DB 문서 생성
# 필요한 산출물: FK 관계(테이블 목록/관계도) + 테이블별 컬럼 상세

schemaspy.t=mysql
schemaspy.dp=/drivers/mysql-connector-j-9.7.0.jar
schemaspy.host=db
schemaspy.port=3306
schemaspy.db=team8
schemaspy.s=team8
schemaspy.u=schemaspy
schemaspy.p=schemaspy
schemaspy.o=/output

# caching_sha2_password + 비-SSL 로컬 접속 허용
schemaspy.connprops=useSSL\=false;allowPublicKeyRetrieval\=true

# 뷰 제외(테이블만), 상세 컬럼/제약/관계 모두 포함
schemaspy.noviews=false

# Flyway 관리 테이블은 앱 스키마가 아니므로 문서에서 제외
schemaspy.I=flyway_schema_history
